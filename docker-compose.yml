version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI + Uvicorn
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avm-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./real_estate_avm.db
      - RESEARCH_LAB_ACCESS_CODE=${RESEARCH_LAB_ACCESS_CODE:-avm-research-2026}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - VALUATION_ENGINE_VERSION=v2.0.0
    volumes:
      # Persist SQLite DB and models
      - avm-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite built into Nginx
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: avm-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  avm-data:
    driver: local
