name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint — Python + JavaScript
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python lint
        run: |
          pip install flake8
          flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: JS lint
        run: |
          cd frontend && npm ci
          npx eslint src/ --max-warnings=50 || true

  # ---------------------------------------------------------------------------
  # Backend Tests — pytest
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env for tests
        run: |
          echo "RESEARCH_LAB_ACCESS_CODE=avm-research-2026" >> .env
          echo "JWT_SECRET_KEY=test-jwt-secret-key-for-ci-only" >> .env

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short

  # ---------------------------------------------------------------------------
  # Frontend Tests — Vitest
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest
        run: cd frontend && npm run test -- --run || true

  # ---------------------------------------------------------------------------
  # Build — Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, backend-test, frontend-test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: real-estate-avm/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: real-estate-avm/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose smoke test
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d
          sleep 10
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml down
