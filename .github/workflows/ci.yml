name: Production CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend + PostgreSQL production tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_DB: real_estate_avm_ci
          POSTGRES_USER: avm_ci
          POSTGRES_PASSWORD: avm-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avm_ci -d real_estate_avm_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://avm_ci:avm-ci-password@localhost:5432/real_estate_avm_ci
      JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only
      RESEARCH_LAB_ACCESS_CODE: avm-research-ci-only
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Migrate fresh PostgreSQL database
        run: python -m alembic upgrade head

      - name: Verify Alembic head
        run: python -m alembic current

      - name: Seed CI production-like reference data
        run: python scripts/quality/seed_ci_reference_data.py

      - name: Run pytest with JUnit and coverage evidence
        run: |
          mkdir -p reports/ci
          python -m pytest tests -q --maxfail=5 \
            --junitxml=reports/ci/pytest-junit.xml \
            --cov=src --cov-report=term-missing \
            --cov-report=xml:reports/ci/coverage.xml

      - name: Audit PostgreSQL catalogue
        run: python scripts/audit_postgres_catalog.py --exact-counts > reports/ci/postgresql-catalog.json

      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-evidence-${{ github.sha }}
          path: |
            reports/ci/pytest-junit.xml
            reports/ci/coverage.xml
            reports/ci/postgresql-catalog.json
          if-no-files-found: warn
          retention-days: 30

  frontend-tests:
    name: Frontend unit tests + production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: |
          mkdir -p ../reports/ci
          npm audit --audit-level=high --json > ../reports/ci/npm-audit.json

      - name: Run frontend unit tests with JUnit evidence
        run: npm run test:ci

      - name: Build production frontend and enforce bundle budgets
        run: |
          npm run build
          node scripts/check-bundle-budget.mjs --report=../reports/ci/frontend-bundle-budget.json

      - name: Record bundle sizes
        run: |
          find dist/assets -type f -printf '%s %p\n' | sort -nr > ../reports/ci/frontend-bundle-sizes.txt

      - name: Upload frontend evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-evidence-${{ github.sha }}
          path: |
            reports/ci/frontend-junit.xml
            reports/ci/npm-audit.json
            reports/ci/frontend-bundle-budget.json
            reports/ci/frontend-bundle-sizes.txt
          if-no-files-found: warn
          retention-days: 30

  test-catalogue:
    name: Production test catalogue contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workbook validator dependency
        run: python -m pip install openpyxl==3.1.5

      - name: Validate scenarios, IDs, RTM and evidence mapping
        run: |
          mkdir -p reports/ci
          python scripts/quality/validate_test_catalog.py \
            --report reports/ci/test-catalogue-validation.json
          python scripts/quality/export_ci_test_matrix.py \
            --report reports/ci/test-catalogue-ci-matrix.json \
            --markdown reports/ci/test-catalogue-ci-matrix.md
          cat reports/ci/test-catalogue-ci-matrix.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload catalogue evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-catalogue-evidence-${{ github.sha }}
          path: |
            docs/testing/AVM_Production_Test_Cases.xlsx
            reports/ci/test-catalogue-validation.json
            reports/ci/test-catalogue-ci-matrix.json
            reports/ci/test-catalogue-ci-matrix.md
          if-no-files-found: error
          retention-days: 30

  security-audit:
    name: Python dependency security gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run blocking pip-audit
        run: |
          mkdir -p reports/ci
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --format=json --output=reports/ci/pip-audit.json

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-evidence-${{ github.sha }}
          path: reports/ci/pip-audit.json
          if-no-files-found: warn
          retention-days: 30

  docker-smoke:
    name: Docker build + migration + health + authenticated UI audit
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, test-catalogue, security-audit]
    env:
      POSTGRES_DB: real_estate_avm
      POSTGRES_USER: avm_app
      POSTGRES_PASSWORD: ci-compose-validation-password
      JWT_SECRET_KEY: ci-compose-validation-jwt-secret
      RESEARCH_LAB_ACCESS_CODE: ci-compose-validation-code
      CORS_ORIGINS: http://localhost
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20 for authenticated UI audit
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.12 for Docker testcase evidence
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish Docker mapped testcase summary
        run: |
          mkdir -p reports/ci
          python -m pip install openpyxl==3.1.5
          python scripts/quality/export_ci_test_matrix.py \
            --report reports/ci/docker-testcase-matrix.json \
            --markdown reports/ci/docker-testcase-matrix.md \
            --job docker-smoke
          cat reports/ci/docker-testcase-matrix.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install locked UI audit runtime
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Validate Compose contract
        run: docker compose config --quiet

      - name: Build immutable application images
        run: docker compose build backend frontend migrate

      - name: Start production-like stack
        run: docker compose up -d postgres backend frontend

      - name: Wait for backend and frontend health
        shell: bash
        run: |
          mkdir -p reports/ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1/api/health > reports/ci/docker-health.json; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Enforce prediction latency SLO inside backend container
        shell: bash
        run: |
          set +e
          docker compose exec -T backend python scripts/load_test.py \
            --url http://127.0.0.1:8000 \
            --endpoint /api/v2/pipeline \
            --requests 20 \
            --concurrency 2 \
            --threshold-ms 200 \
            --report /tmp/prediction-latency.json
          status=$?
          mkdir -p reports/ci
          docker compose cp backend:/tmp/prediction-latency.json reports/ci/prediction-latency.json || true
          docker compose logs --no-color backend > reports/ci/docker-backend-after-latency.log || true
          if [ -f reports/ci/prediction-latency.json ]; then
            {
              echo "### Prediction latency SLO evidence"
              echo
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("reports/ci/prediction-latency.json").read_text(encoding="utf-8"))
          print(f"- Status: `{report.get('status')}`")
          print(f"- Success: `{report.get('successful_requests')}/{report.get('total_requests')}`")
          print(f"- p95: `{report.get('p95_ms')} ms` / threshold `{report.get('threshold_ms')} ms`")
          if report.get("errors"):
              print(f"- Errors: `{report['errors']}`")
              samples = report.get("error_samples") or {}
              for key, sample in samples.items():
                  print(f"- Sample `{key}`: `{sample[:180]}`")
          PY
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"

      - name: Seed isolated admin and user audit accounts
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"username":"codex_ui_audit_admin","password":"CodexAuditAdmin!2026","email":"ci-admin@example.test"}' \
            http://127.0.0.1/api/auth/seed-admin >/dev/null
          curl --fail-with-body --silent --show-error \
            -H 'Content-Type: application/json' \
            -d '{"username":"codex_ui_audit_user","password":"CodexAuditUser!2026","email":"ci-user@example.test"}' \
            http://127.0.0.1/api/auth/register >/dev/null

      - name: Audit authenticated admin and user production UI
        working-directory: frontend
        env:
          UI_BASE_URL: http://127.0.0.1
          API_BASE_URL: http://127.0.0.1
        run: |
          UI_AUDIT_ROLE=admin npm run audit:ui
          UI_AUDIT_ROLE=user npm run audit:ui

      - name: Record container state and logs
        if: always()
        shell: bash
        run: |
          mkdir -p reports/ci
          docker compose ps --format json > reports/ci/docker-compose-ps.json || true
          docker compose logs --no-color > reports/ci/docker-compose.log || true

      - name: Upload Docker smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-evidence-${{ github.sha }}
          path: |
            reports/ci/docker-health.json
            reports/ci/prediction-latency.json
            reports/ci/docker-backend-after-latency.log
            reports/ci/docker-testcase-matrix.json
            reports/ci/docker-testcase-matrix.md
            reports/ci/docker-compose-ps.json
            reports/ci/docker-compose.log
            reports/ui-audit/baseline
          if-no-files-found: warn
          retention-days: 30

      - name: Stop stack
        if: always()
        run: docker compose down --volumes --remove-orphans
