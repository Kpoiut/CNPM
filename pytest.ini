[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
env =
    RESEARCH_LAB_ACCESS_CODE=avm-research-2026
    JWT_SECRET_KEY=test-jwt-secret-key-for-ci-only
